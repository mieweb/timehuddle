services:
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npx tsx watch src/server.ts"
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_nm:/app/node_modules
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/timehuddle
      - PORT=4000
      - TRUSTED_ORIGINS=http://localhost:3000
    env_file:
      - path: ./backend/.env.local
        required: false
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npx vite --host"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - frontend_nm:/app/node_modules
    environment:
      - API_TARGET=http://backend:4000
    depends_on:
      - backend

volumes:
  mongo_data:
  backend_nm:
  frontend_nm:
