services:
  mongodb:
    image: mongo:8
    # Single-node replica set so Meteor can tail the oplog for reactive publications.
    command: ['mongod', '--replSet', 'rs0', '--bind_ip_all']
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      # Initiates the replica set on first run; afterwards just reports health.
      test:
        [
          'CMD',
          'mongosh',
          '--quiet',
          '--eval',
          "try { rs.status().ok } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }).ok }",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo-express:
    image: mongo-express:latest
    ports:
      - '8081:8081'
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongodb
      - ME_CONFIG_MONGODB_PORT=27017
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025'
      - '8025:8025'

  backend:
    image: node:24-alpine
    working_dir: /app/backend
    command: sh -c "cd /app && npm install && cd /app/backend && npm run migrate && npx tsx watch src/server.ts"
    ports:
      - '4000:4000'
    volumes:
      - .:/app
      - root_nm:/app/node_modules
      - backend_nm:/app/backend/node_modules
    environment:
      # directConnection: the replica-set member advertises localhost:27017 (host-friendly),
      # so containers must skip topology discovery and connect to the seed directly.
      - MONGODB_URI=mongodb://mongodb:27017/timehuddle?directConnection=true
      - PORT=4000
      - BETTER_AUTH_URL=http://localhost:4000
      - APP_URL=http://localhost:3000
      - TRUSTED_ORIGINS=http://localhost:3000,http://localhost:8080
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_SECURE=false
      - EMAIL_FROM=noreply@timehuddle.local
    env_file:
      - path: ./backend/.env.local
        required: false
    depends_on:
      mailpit:
        condition: service_started
      mongodb:
        condition: service_healthy

  # Meteor 3 backend (meteor-wormhole REST/MCP bridge) — runs alongside the
  # Fastify backend during the migration. Custom image because Meteor can't run
  # on the node:24-alpine base the other services use (see Dockerfile.dev).
  meteor-backend:
    build:
      context: ./meteor-backend
      dockerfile: Dockerfile.dev
    working_dir: /app/meteor-backend
    command: sh -c "npm install && meteor run --allow-superuser --port 3100"
    ports:
      - '3100:3100'
    volumes:
      - .:/app
      # Shadow host (macOS) build artifacts with Linux-native ones.
      - meteor_nm:/app/meteor-backend/node_modules
      - meteor_local:/app/meteor-backend/.meteor/local
    environment:
      # meteor-wormhole lives in vendor/, resolved relative to this working_dir.
      - METEOR_PACKAGE_DIRS=../vendor/meteor-wormhole/packages
      - METEOR_ALLOW_SUPERUSER=true
      # directConnection: the rs0 member advertises localhost; containers must
      # connect to the seed directly and tail the oplog from the `local` db.
      - MONGO_URL=mongodb://mongodb:27017/timehuddle?directConnection=true
      - MONGO_OPLOG_URL=mongodb://mongodb:27017/local?directConnection=true
      # Allowed CORS origins for the /api REST bridge (the Vite frontend).
      - CORS_ORIGINS=http://localhost:3000
    env_file:
      - path: ./meteor-backend/.env.local
        required: false
    depends_on:
      mongodb:
        condition: service_healthy

  frontend:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "npm install && npx vite --host"
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - frontend_nm:/app/node_modules
    environment:
      - API_TARGET=http://backend:4000
      # Base URL the SPA uses to reach the Meteor backend (browser-side origin).
      - VITE_METEOR_URL=http://localhost:3100
      # Comma-separated social sign-in buttons to show on the login form.
      # Options: github, google, apple, authentik (each also needs backend creds).
      - VITE_SOCIAL_PROVIDERS=github
    depends_on:
      - backend

volumes:
  mongo_data:
  root_nm:
  backend_nm:
  frontend_nm:
  meteor_nm:
  meteor_local:
