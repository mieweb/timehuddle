name: Main Branch Deployment

# Push to main → auto-deploy to DEV
# Manual dispatch → choose DEV or PROD deployment
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, prod]
        default: dev

concurrency:
  group: main-deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

jobs:
  # ── PRE-DEPLOY CHECKS ────────────────────────────────────────────────────────
  checks_frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
        continue-on-error: true

      - name: Build
        run: npm run build

  checks_backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install Meteor backend dependencies
        working-directory: meteor-backend
        run: npm ci

      - name: Lint Meteor backend
        working-directory: meteor-backend
        run: npm run lint || echo "Lint not configured"

      - name: Typecheck Meteor backend
        working-directory: meteor-backend
        run: npm run typecheck || echo "Typecheck not configured"

      - name: Test Meteor backend
        working-directory: meteor-backend
        env:
          MONGODB_URI: mongodb://localhost:27017/timehuddle_test
        run: npm test || echo "Tests not configured"

  # ── DEVELOPMENT DEPLOYMENT ───────────────────────────────────────────────────
  deploy_dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: [checks_frontend, checks_backend]
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    environment:
      name: development
      url: https://timehuddledev.os.mieweb.org
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Add both frontend and backend hosts to known_hosts
          ssh-keyscan -p 2062 timehuddledev.os.mieweb.org >> ~/.ssh/known_hosts
          ssh-keyscan -p 2063 timecore-dev.os.mieweb.org >> ~/.ssh/known_hosts

      - name: Deploy Frontend to DEV (timehuddledev.os.mieweb.org:2062)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p 2062 \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              pdharamkar@timehuddledev.os.mieweb.org bash << 'ENDSSH'
            set -e
            cd ~/timehuddle || { echo "ERROR: timehuddle directory not found"; exit 1; }

            echo "=== Current status ==="
            pwd
            git branch --show-current
            sudo pm2 list

            echo "=== check for local changes ==="
            if [[ -n $(git status -s) ]]; then
              echo "Local changes detected, stashing..."
              git stash save "auto-stash-before-deploy-$(date +%Y%m%d-%H%M%S)"
              STASHED=true
            else
              echo "No local changes to stash"
              STASHED=false
            fi

            echo "=== git fetch + checkout main ==="
            git fetch origin
            git checkout main
            
            echo "=== git pull (merge remote changes) ==="
            git pull origin main

            echo "=== restore stashed changes (if any) ==="
            if [ "$STASHED" = "true" ]; then
              echo "Attempting to restore stashed changes..."
              if git stash pop; then
                echo "✓ Stashed changes restored successfully"
              else
                echo "⚠ Warning: Stash pop had conflicts, stash preserved"
                echo "Run 'git stash list' on server to see stashed changes"
              fi
            fi
            
            echo "Current branch: $(git branch --show-current)"
            echo "Latest commit: $(git log -1 --oneline)"
            
            echo "=== check for uncommitted changes ==="
            if [[ -n $(git status -s) ]]; then
              echo "⚠ Warning: Uncommitted changes present:"
              git status -s
            else
              echo "✓ Working directory clean"
            fi

            echo "=== sudo npm install ==="
            sudo npm install --no-audit --no-fund

            echo "=== sudo npm run build ==="
            sudo rm -rf dist
            sudo npm run build

            echo "=== verify build output ==="
            if [ ! -d "dist" ] || [ ! -f "dist/index.html" ]; then
              echo "ERROR: Build failed - dist/ directory missing or incomplete"
              exit 1
            fi
            echo "Build output verified"

            echo "=== sudo pm2 restart timehuddle-frontend ==="
            sudo pm2 restart timehuddle-frontend
            sudo pm2 save

            echo "=== verify frontend is running ==="
            sleep 3
            ok=false
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/ 2>/dev/null) || STATUS="000"
              if [ "$STATUS" = "200" ]; then
                echo "✓ DEV frontend OK (HTTP 200) - attempt $i"
                ok=true
                break
              fi
              echo "Attempt $i: HTTP $STATUS — retrying in 5s"
              sleep 5
            done
            
            if [ "$ok" != "true" ]; then
              echo "ERROR: DEV frontend not responding after 5 attempts"
              exit 1
            fi
            
            echo "=== Deployment summary ==="
            sudo pm2 list
            echo "Frontend deployment completed successfully"
          ENDSSH

      - name: Deploy Backend to DEV (timecore-dev.os.mieweb.org:2063)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p 2063 \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              pdharamkar@timecore-dev.os.mieweb.org bash << 'ENDSSH'
            set -e
            cd ~/timehuddle || { echo "ERROR: timehuddle directory not found"; exit 1; }

            echo "=== Current status ==="
            pwd
            git branch --show-current
            sudo pm2 list

            echo "=== check for local changes ==="
            if [[ -n $(git status -s) ]]; then
              echo "Local changes detected, stashing..."
              git stash save "auto-stash-before-deploy-$(date +%Y%m%d-%H%M%S)"
              STASHED=true
            else
              echo "No local changes to stash"
              STASHED=false
            fi

            echo "=== git fetch + checkout main ==="
            git fetch origin
            git checkout main
            
            echo "=== git pull (merge remote changes) ==="
            git pull origin main

            echo "=== restore stashed changes (if any) ==="
            if [ "$STASHED" = "true" ]; then
              echo "Attempting to restore stashed changes..."
              if git stash pop; then
                echo "✓ Stashed changes restored successfully"
              else
                echo "⚠ Warning: Stash pop had conflicts, stash preserved"
                echo "Run 'git stash list' on server to see stashed changes"
              fi
            fi
            
            echo "Current branch: $(git branch --show-current)"
            echo "Latest commit: $(git log -1 --oneline)"
            
            echo "=== check for uncommitted changes ==="
            if [[ -n $(git status -s) ]]; then
              echo "⚠ Warning: Uncommitted changes present:"
              git status -s
            else
              echo "✓ Working directory clean"
            fi

            echo "=== sudo npm install (root) ==="
            sudo npm install --no-audit --no-fund

            echo "=== sudo npm install (meteor-backend) ==="
            cd meteor-backend
            sudo npm install --no-audit --no-fund

            echo "=== sudo pm2 restart timehuddle-meteor ==="
            sudo pm2 restart timehuddle-meteor
            sudo pm2 save

            echo "=== verify backend is running ==="
            sleep 3
            ok=false
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/health 2>/dev/null) || STATUS="000"
              if [ "$STATUS" = "200" ]; then
                echo "✓ DEV backend OK (HTTP 200) - attempt $i"
                ok=true
                break
              fi
              echo "Attempt $i: HTTP $STATUS — retrying in 5s"
              sleep 5
            done
            
            if [ "$ok" != "true" ]; then
              echo "ERROR: DEV backend not responding after 5 attempts"
              exit 1
            fi
            
            echo "=== Deployment summary ==="
            sudo pm2 list
            echo "Backend deployment completed successfully"
          ENDSSH

  verify_dev:
    name: Verify DEV
    runs-on: ubuntu-latest
    needs: deploy_dev
    steps:
      - name: Verify frontend is accessible
        run: |
          echo "=== Verifying https://timehuddledev.os.mieweb.org ==="
          sleep 5

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://timehuddledev.os.mieweb.org) || STATUS="000"
          echo "HTTP status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: DEV frontend returned HTTP $STATUS"
            exit 1
          fi

          BODY=$(curl -s https://timehuddledev.os.mieweb.org) || BODY=""
          echo "$BODY" | grep -q "TimeHuddle" || {
            echo "ERROR: 'TimeHuddle' not found in response - app may not be serving correctly"
            exit 1
          }

          echo "✓ DEV frontend verified successfully"

      - name: Verify backend is accessible
        run: |
          echo "=== Verifying https://timecore-dev.os.mieweb.org/health ==="

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://timecore-dev.os.mieweb.org/health) || STATUS="000"
          echo "HTTP status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: DEV backend returned HTTP $STATUS"
            exit 1
          fi

          HEALTH=$(curl -s https://timecore-dev.os.mieweb.org/health) || HEALTH=""
          echo "Health response: $HEALTH"

          echo "$HEALTH" | grep -q '"status":"ok"' || {
            echo "ERROR: Backend health check failed"
            exit 1
          }

          echo "✓ DEV backend verified successfully"

      - name: DEV Deployment Summary
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║         DEV DEPLOYMENT COMPLETED SUCCESSFULLY              ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "Frontend: https://timehuddledev.os.mieweb.org"
          echo "Backend:  https://timecore-dev.os.mieweb.org"
          echo ""
          echo "Branch:   main"
          echo "Commit:   ${{ github.sha }}"
          echo "Actor:    ${{ github.actor }}"
          echo "Time:     $(date -u +"%Y-%m-%d %H:%M:%S UTC")"

  # ── PRODUCTION DEPLOYMENT ────────────────────────────────────────────────────
  deploy_prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: [checks_frontend, checks_backend]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    environment:
      name: production
      url: https://huddle.os.mieweb.org
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Add both frontend and backend hosts to known_hosts
          ssh-keyscan -p 2090 huddle.os.mieweb.org >> ~/.ssh/known_hosts
          ssh-keyscan -p 2090 timecore-prod.os.mieweb.org >> ~/.ssh/known_hosts

      - name: Deploy Frontend to PROD (huddle.os.mieweb.org:2090)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p 2090 \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              pdharamkar@huddle.os.mieweb.org bash << 'ENDSSH'
            set -e
            cd ~/timehuddle || { echo "ERROR: timehuddle directory not found"; exit 1; }

            echo "=== Current status ==="
            pwd
            git branch --show-current
            sudo pm2 list

            echo "=== check for local changes ==="
            if [[ -n $(git status -s) ]]; then
              echo "Local changes detected, stashing..."
              git stash save "auto-stash-before-deploy-$(date +%Y%m%d-%H%M%S)"
              STASHED=true
            else
              echo "No local changes to stash"
              STASHED=false
            fi

            echo "=== git fetch + checkout main ==="
            git fetch origin
            git checkout main
            
            echo "=== git pull (merge remote changes) ==="
            git pull origin main

            echo "=== restore stashed changes (if any) ==="
            if [ "$STASHED" = "true" ]; then
              echo "Attempting to restore stashed changes..."
              if git stash pop; then
                echo "✓ Stashed changes restored successfully"
              else
                echo "⚠ Warning: Stash pop had conflicts, stash preserved"
                echo "Run 'git stash list' on server to see stashed changes"
              fi
            fi
            
            echo "Current branch: $(git branch --show-current)"
            echo "Latest commit: $(git log -1 --oneline)"
            
            echo "=== check for uncommitted changes ==="
            if [[ -n $(git status -s) ]]; then
              echo "⚠ Warning: Uncommitted changes present:"
              git status -s
            else
              echo "✓ Working directory clean"
            fi

            echo "=== sudo npm install ==="
            sudo npm install --no-audit --no-fund

            echo "=== sudo npm run build ==="
            sudo rm -rf dist
            sudo npm run build

            echo "=== verify build output ==="
            if [ ! -d "dist" ] || [ ! -f "dist/index.html" ]; then
              echo "ERROR: Build failed - dist/ directory missing or incomplete"
              exit 1
            fi
            echo "Build output verified"

            echo "=== sudo pm2 restart all ==="
            sudo pm2 restart all
            sudo pm2 save

            echo "=== verify frontend is running ==="
            sleep 3
            ok=false
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/ 2>/dev/null) || STATUS="000"
              if [ "$STATUS" = "200" ]; then
                echo "✓ Production frontend OK (HTTP 200) - attempt $i"
                ok=true
                break
              fi
              echo "Attempt $i: HTTP $STATUS — retrying in 5s"
              sleep 5
            done
            
            if [ "$ok" != "true" ]; then
              echo "ERROR: Production frontend not responding after 5 attempts"
              exit 1
            fi
            
            echo "=== Deployment summary ==="
            sudo pm2 list
            echo "Frontend deployment completed successfully"
          ENDSSH

      - name: Deploy Backend to PROD (timecore-prod.os.mieweb.org:2090)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p 2090 \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              pdharamkar@timecore-prod.os.mieweb.org bash << 'ENDSSH'
            set -e
            cd ~/timehuddle/meteor-backend || { echo "ERROR: meteor-backend directory not found"; exit 1; }

            echo "=== Current status ==="
            pwd
            cd ..
            git branch --show-current
            pm2 list

            echo "=== check for local changes ==="
            if [[ -n $(git status -s) ]]; then
              echo "Local changes detected, stashing..."
              git stash save "auto-stash-before-deploy-$(date +%Y%m%d-%H%M%S)"
              STASHED=true
            else
              echo "No local changes to stash"
              STASHED=false
            fi

            echo "=== git fetch + checkout main ==="
            git fetch origin
            git checkout main
            
            echo "=== git pull (merge remote changes) ==="
            git pull origin main

            echo "=== restore stashed changes (if any) ==="
            if [ "$STASHED" = "true" ]; then
              echo "Attempting to restore stashed changes..."
              if git stash pop; then
                echo "✓ Stashed changes restored successfully"
              else
                echo "⚠ Warning: Stash pop had conflicts, stash preserved"
                echo "Run 'git stash list' on server to see stashed changes"
              fi
            fi
            
            echo "Current branch: $(git branch --show-current)"
            echo "Latest commit: $(git log -1 --oneline)"
            
            echo "=== check for uncommitted changes ==="
            if [[ -n $(git status -s) ]]; then
              echo "⚠ Warning: Uncommitted changes present:"
              git status -s
            else
              echo "✓ Working directory clean"
            fi

            echo "=== sudo npm install (root) ==="
            sudo npm install --no-audit --no-fund

            echo "=== sudo npm install (meteor-backend) ==="
            cd meteor-backend
            sudo npm install --no-audit --no-fund

            echo "=== pm2 restart meteor backend (try user's pm2 first, then sudo) ==="
            pm2 restart 2 || pm2 restart timehuddle-meteor || \
            sudo pm2 restart 2 || sudo pm2 restart timehuddle-meteor || \
            echo "WARNING: Could not restart meteor backend via pm2"
            
            # Save pm2 process list (whichever instance actually has the process)
            pm2 save 2>/dev/null || sudo pm2 save 2>/dev/null || true

            echo "=== pm2 list ==="
            sudo pm2 list
          ENDSSH

  verify_prod:
    name: Verify PROD
    runs-on: ubuntu-latest
    needs: deploy_prod
    steps:
      - name: Verify frontend is accessible
        run: |
          echo "=== Verifying https://huddle.os.mieweb.org ==="
          sleep 5

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://huddle.os.mieweb.org) || STATUS="000"
          echo "HTTP status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Production frontend returned HTTP $STATUS"
            exit 1
          fi

          BODY=$(curl -s https://huddle.os.mieweb.org) || BODY=""
          echo "$BODY" | grep -q "TimeHuddle" || {
            echo "ERROR: 'TimeHuddle' not found in response - app may not be serving correctly"
            exit 1
          }

          echo "✓ Production frontend verified successfully"

      - name: Verify backend is accessible
        run: |
          echo "=== Verifying https://timecore-prod.os.mieweb.org/health ==="

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://timecore-prod.os.mieweb.org/health) || STATUS="000"
          echo "HTTP status: $STATUS"

          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Production backend returned HTTP $STATUS"
            exit 1
          fi

          HEALTH=$(curl -s https://timecore-prod.os.mieweb.org/health) || HEALTH=""
          echo "Health response: $HEALTH"

          echo "$HEALTH" | grep -q '"status":"ok"' || {
            echo "ERROR: Backend health check failed"
            exit 1
          }

          echo "✓ Production backend verified successfully"

      - name: Smoke test - verify deployment
        run: |
          echo "=== Running deployment smoke tests ==="

          # Test backend /hi endpoint
          echo "Testing backend /hi endpoint..."
          BACKEND_HI=$(curl -s https://timecore-prod.os.mieweb.org/hi) || BACKEND_HI=""
          echo "Backend /hi response: $BACKEND_HI"

          echo "$BACKEND_HI" | grep -q '"message":"hi from meteor backend"' || {
            echo "ERROR: Backend /hi endpoint did not return expected response"
            exit 1
          }

          echo "✓ Backend smoke test passed"

          # Test frontend /hi page
          echo "Testing frontend /app/hi page..."
          FRONTEND_HI=$(curl -s https://huddle.os.mieweb.org/app/hi) || FRONTEND_HI=""

          echo "$FRONTEND_HI" | grep -q "Hi from Frontend" || {
            echo "WARNING: Frontend /app/hi page may not be rendering correctly"
            echo "This is expected if the page requires authentication"
          }

          echo "✓ Smoke tests completed"

      - name: PROD Deployment Summary
        run: |
          echo "╔════════════════════════════════════════════════════════════╗"
          echo "║         PRODUCTION DEPLOYMENT COMPLETED SUCCESSFULLY        ║"
          echo "╚════════════════════════════════════════════════════════════╝"
          echo ""
          echo "Frontend: https://huddle.os.mieweb.org"
          echo "Backend:  https://timecore-prod.os.mieweb.org"
          echo ""
          echo "Branch:   main"
          echo "Commit:   ${{ github.sha }}"
          echo "Actor:    ${{ github.actor }}"
          echo "Time:     $(date -u +"%Y-%m-%d %H:%M:%S UTC")"
