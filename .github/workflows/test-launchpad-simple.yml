name: Test Launchpad (Simple Nginx)

# One-shot sanity check: deploys a plain nginx container via Launchpad
# to verify secrets, port mapping, and URL routing work for this repo
# before worrying about Meteor build time.
#
# Trigger manually from Actions > Run workflow, or push to this branch.
on:
  workflow_dispatch:
    inputs:
      cleanup:
        description: 'Delete the test container after checking?'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  deploy-nginx-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      container_name: ${{ steps.names.outputs.container_name }}
      url: ${{ steps.names.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - id: names
        name: Compute test container name
        run: |
          CONTAINER_NAME="mieweb-timehuddle-launchpad-test"
          echo "container_name=${CONTAINER_NAME}" >> "$GITHUB_OUTPUT"
          echo "url=https://${CONTAINER_NAME}.os.mieweb.org" >> "$GITHUB_OUTPUT"

      # Use nginx:alpine — a tiny, public image that serves on port 80.
      # This eliminates all Meteor/build variables so we isolate launchpad itself.
      - name: Deploy nginx test container via Launchpad
        uses: mieweb/launchpad@main
        with:
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
          template_name: docker.io/library/nginx:alpine
          services: >-
            [{"type":"http","internalPort":80,"externalHostname":"${{ steps.names.outputs.container_name }}","externalDomainId":1}]

      - name: Curl test — verify URL is reachable
        run: |
          URL="${{ steps.names.outputs.url }}"
          echo "Testing: $URL"
          for i in $(seq 1 12); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            echo "Attempt $i — HTTP $CODE"
            if [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ]; then
              echo "✅ URL is reachable (HTTP $CODE)"
              exit 0
            fi
            sleep 10
          done
          echo "❌ URL did not respond within 2 minutes"
          exit 1

      - name: Print access details
        run: |
          echo "=================================================="
          echo "Nginx test container deployed successfully"
          echo "URL: ${{ steps.names.outputs.url }}"
          echo "If URL is reachable → launchpad secrets + port mapping work"
          echo "Any issues here are infra-level, not Meteor/app-level"
          echo "=================================================="

  cleanup-nginx-test:
    needs: deploy-nginx-test
    if: github.event.inputs.cleanup == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Delete test container
        uses: mieweb/launchpad@main
        with:
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
          # Omitting template_name → launchpad deletes the container
