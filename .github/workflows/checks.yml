name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev, prod]

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format
        run: npm run format

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Format
        working-directory: backend
        run: npm run format

      - name: Typecheck
        working-directory: backend
        run: npm run typecheck

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Test
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/timehuddle_test
          BETTER_AUTH_SECRET: ci-test-secret
          PORT: 4000
        run: npm test

      - name: Upload backend build
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
          retention-days: 1

  playwright:
    name: Playwright Checks
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Download backend build
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/

      - name: Start backend
        env:
          MONGODB_URI: mongodb://localhost:27017/timehuddle_e2e
          BETTER_AUTH_SECRET: ci-e2e-secret
          BETTER_AUTH_URL: http://localhost:4000
          TRUSTED_ORIGINS: http://localhost:3000
          APP_URL: http://localhost:3000
          PORT: 4000
        run: cd backend && node dist/server.js &

      - name: Start frontend preview
        run: npx vite preview --port 3000 &

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:3000 http://localhost:4000/health --timeout 30000

      - name: Seed database
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/timehuddle_e2e
          BETTER_AUTH_SECRET: ci-e2e-secret
          BETTER_AUTH_URL: http://localhost:4000
          TRUSTED_ORIGINS: http://localhost:3000
          APP_URL: http://localhost:3000
          PORT: 4000
        run: npm run seed

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  ios:
    name: iOS — simulator build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Build for simulator
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -target App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
