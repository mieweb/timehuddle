name: Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, dev, prod]

jobs:
  frontend:
    name: Frontend — lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  backend:
    name: Backend — typecheck, test
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/timehuddle_test
          BETTER_AUTH_SECRET: ci-test-secret
          PORT: 4000
        run: npm test

  ios:
    name: iOS — simulator build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Vite build
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Build for simulator
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -target App \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
