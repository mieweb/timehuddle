name: Debug Launchpad Job Status

# TEMPORARY: standalone diagnostic to inspect raw job log rows via
# /api/v1/jobs/{id}/status without triggering a full build+deploy cycle.
# Safe to delete once the PR preview provisioning issue is understood.
on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Job ID to inspect"
        required: true

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch job metadata
        env:
          API_KEY: ${{ secrets.LAUNCHPAD_API_KEY }}
          API_URL: ${{ secrets.LAUNCHPAD_API_URL }}
          JOB_ID: ${{ github.event.inputs.job_id }}
        run: |
          echo "--- job metadata ---"
          curl -s -H "Authorization: Bearer $API_KEY" -H "Accept: application/json" \
            "$API_URL/api/v1/jobs/$JOB_ID" | jq .

      - name: Fetch job status log rows
        env:
          API_KEY: ${{ secrets.LAUNCHPAD_API_KEY }}
          API_URL: ${{ secrets.LAUNCHPAD_API_URL }}
          JOB_ID: ${{ github.event.inputs.job_id }}
        run: |
          echo "--- job status rows ---"
          curl -s -H "Authorization: Bearer $API_KEY" -H "Accept: application/json" \
            "$API_URL/api/v1/jobs/$JOB_ID/status?limit=1000" | jq .

      - name: Fetch current container record
        env:
          API_KEY: ${{ secrets.LAUNCHPAD_API_KEY }}
          API_URL: ${{ secrets.LAUNCHPAD_API_URL }}
        run: |
          echo "--- container record ---"
          curl -s -H "Authorization: Bearer $API_KEY" -H "Accept: application/json" \
            "$API_URL/api/v1/sites/1/containers?hostname=mieweb-timehuddle-test-docker-pr-preview" | jq .
