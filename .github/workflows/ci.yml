name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_and_types:
    name: Lint & Type Check (Node 25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 25
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'npm'
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npm run typecheck
      - name: Test
        run: npm test

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: lint_and_types
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 25
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'npm'
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-build
          path: dist
          if-no-files-found: error
