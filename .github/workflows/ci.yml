name: CI / Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_and_types:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: lint_and_types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - run: npm run build

  deploy_dev:
    name: Deploy - DEV
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_DEV_PORT }} ${{ secrets.DEPLOY_DEV_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to DEV
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_DEV_PORT }} \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_DEV_HOST }} << 'ENDSSH'
            set -e
            cd ~/timehuddle
            echo "=== stop pm2 ==="
            sudo pm2 stop timehuddle-frontend || true
            echo "=== git pull ==="
            git fetch origin
            git reset --hard origin/main
            echo "=== npm install ==="
            npm install --no-audit --no-fund
            echo "=== build ==="
            sudo rm -rf dist
            npm run build
            echo "=== pm2 restart ==="
            sudo pm2 restart timehuddle-frontend
            sudo pm2 save
            echo "=== verify ==="
            sleep 2
            curl -s http://localhost:80/ | grep -o '<title>.*</title>'
            echo "DEV deployed OK"
          ENDSSH

  verify_dev:
    name: Verify - DEV
    runs-on: ubuntu-latest
    needs: deploy_dev
    steps:
      - name: Health check DEV
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.DEPLOY_DEV_URL }})
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "DEV health check failed (HTTP $STATUS)"; exit 1; }

  deploy_prod:
    name: Deploy - PROD
    runs-on: ubuntu-latest
    needs: verify_dev
    environment: production
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PROD_PORT }} ${{ secrets.DEPLOY_PROD_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to PROD
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_PROD_PORT }} \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_PROD_HOST }} << 'ENDSSH'
            set -e
            cd ~/timehuddle
            echo "=== stop pm2 ==="
            sudo pm2 stop timehuddle-frontend || true
            echo "=== git pull ==="
            git fetch origin
            git reset --hard origin/main
            echo "=== npm install ==="
            npm install --no-audit --no-fund
            echo "=== build ==="
            sudo rm -rf dist
            npm run build
            echo "=== pm2 restart ==="
            sudo pm2 restart timehuddle-frontend
            sudo pm2 save
            echo "=== verify ==="
            sleep 2
            curl -s http://localhost:80/ | grep -o '<title>.*</title>'
            echo "PROD deployed OK"
          ENDSSH

  verify_prod:
    name: Verify - PROD
    runs-on: ubuntu-latest
    needs: deploy_prod
    steps:
      - name: Health check PROD
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.DEPLOY_PROD_URL }})
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || { echo "PROD health check failed (HTTP $STATUS)"; exit 1; }
