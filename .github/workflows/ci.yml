name: CI / Deploy Frontend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Deploy after build?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_and_types:
    name: Lint & Type Check (Node 25)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 25
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'npm'
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Type Check
        run: npm run typecheck
      - name: Test
        run: npm test

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: lint_and_types
    steps:
      - uses: actions/checkout@v4
      - name: Use Node 25
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'npm'
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Build
        run: npm run build
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: vite-build
          path: dist
          if-no-files-found: error

  deploy:
    name: Deploy Frontend - ${{ matrix.env }}
    runs-on: ubuntu-latest
    needs: build
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && inputs.deploy == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - env: DEV
            host_secret: SSH_HOST_DEV
            port_secret: SSH_PORT_DEV
            key_secret: SSH_PRIVATE_KEY_DEV
            pm2_name: timehuddledev
          - env: PROD
            host_secret: SSH_HOST_PROD
            port_secret: SSH_PORT_PROD
            key_secret: SSH_PRIVATE_KEY_PROD
            pm2_name: timehuddle-prod

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets[matrix.key_secret] }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets[matrix.port_secret] }} ${{ secrets[matrix.host_secret] }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to ${{ matrix.env }}
        run: |
          ssh -p ${{ secrets[matrix.port_secret] }} \
              -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.SSH_USER }}@${{ secrets[matrix.host_secret] }} << 'EOF'
            set -e

            REPO_DIR="$HOME/timehuddle"
            PM2_NAME="${{ matrix.pm2_name }}"

            git config --global --add safe.directory "$REPO_DIR" 2>/dev/null || true

            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "📥 Cloning repository for first-time setup..."
              git clone https://github.com/mieweb/timehuddle.git "$REPO_DIR"
            fi

            cd "$REPO_DIR"

            echo "🛑 Stopping PM2 process: $PM2_NAME..."
            pm2 stop "$PM2_NAME" 2>/dev/null || true

            echo "🔄 Fetching and pulling latest code..."
            git fetch origin
            git pull origin main

            echo "⚙️  Installing dependencies..."
            npm install

            echo "🏗️  Building frontend..."
            npm run build

            echo "🚀 Restarting PM2..."
            if pm2 describe "$PM2_NAME" > /dev/null 2>&1; then
              pm2 restart "$PM2_NAME" --update-env
            else
              echo "❌ PM2 process '$PM2_NAME' not found. Please start it manually on the server first."
              exit 1
            fi
            pm2 save

            echo "⏳ Waiting for process to stabilize..."
            sleep 5

            echo "📊 PM2 Status:"
            pm2 status

            echo "✅ Verifying $PM2_NAME is online..."
            if pm2 list | grep -E "$PM2_NAME" | grep -q "online"; then
              echo "✅ ${{ matrix.env }} frontend deployment successful! $PM2_NAME is online."
            else
              echo "❌ $PM2_NAME failed to start!"
              pm2 logs "$PM2_NAME" --lines 30 --nostream || true
              exit 1
            fi
          EOF

      - name: Deployment Status
        if: failure()
        run: echo "❌ ${{ matrix.env }} frontend deployment failed!"
