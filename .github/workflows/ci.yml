name: CI / Deploy

# Push to `dev`  → deploys frontend (timehuddledev:2062) + backend (timecoredev:2063)
# Push to `prod` → deploys frontend (timehuddle-prod:2064) + backend (timecore-prod:2065)

on:
  push:
    branches: [dev, prod]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, prod]

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_and_types:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: lint_and_types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build

  # ── DEV ──────────────────────────────────────────────────────────────────────
  deploy_dev:
    name: Deploy - DEV (frontend + backend)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_DEV_PORT }} ${{ secrets.DEPLOY_DEV_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -p ${{ secrets.DEPLOY_DEV_BACKEND_PORT }} ${{ secrets.DEPLOY_DEV_BACKEND_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend to DEV (timehuddledev:2062)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_DEV_PORT }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_DEV_HOST }} bash << 'ENDSSH'
            echo "=== git sync → dev ==="
            cd /home/pdharamkar/timehuddle || { echo "ERROR: repo dir missing"; exit 1; }
            git fetch origin || { echo "ERROR: git fetch failed"; exit 1; }
            git checkout -f -B dev origin/dev || { echo "ERROR: git checkout failed"; exit 1; }
            git clean -fd
            echo "branch: $(git branch --show-current)"

            echo "=== npm install ==="
            npm install --no-audit --no-fund || { echo "ERROR: npm install failed"; exit 1; }

            echo "=== build ==="
            rm -rf dist
            npm run build || { echo "ERROR: build failed"; exit 1; }

            echo "=== pm2 restart ==="
            sudo pm2 restart timehuddle-frontend || { echo "ERROR: pm2 restart failed"; exit 1; }
            sudo pm2 save

            echo "=== verify ==="
            ok=false
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/ 2>/dev/null) || STATUS="000"
              if [ "$STATUS" = "200" ]; then
                echo "DEV frontend OK (HTTP 200)"
                ok=true
                break
              fi
              echo "Attempt $i: HTTP $STATUS — retrying in 5s"
              sleep 5
            done
            if [ "$ok" != "true" ]; then
              echo "ERROR: DEV frontend not ready after retries"
              exit 1
            fi
          ENDSSH

      - name: Deploy backend to DEV (timecoredev:2063)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_DEV_BACKEND_PORT }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_DEV_BACKEND_HOST }} bash << 'ENDSSH'
            echo "=== git sync → dev ==="
            cd /home/pdharamkar/timehuddle || { echo "ERROR: repo dir missing"; exit 1; }
            git fetch origin || { echo "ERROR: git fetch failed"; exit 1; }
            git checkout -f -B dev origin/dev || { echo "ERROR: git checkout failed"; exit 1; }
            git clean -fd
            echo "branch: $(git branch --show-current)"

            echo "=== backend npm install ==="
            cd backend || { echo "ERROR: backend dir missing"; exit 1; }
            npm install --no-audit --no-fund || { echo "ERROR: npm install failed"; exit 1; }

            echo "=== pm2 restart ==="
            sudo pm2 restart timehuddle-api || { echo "ERROR: pm2 restart failed"; exit 1; }
            sudo pm2 save
            echo "DEV backend OK"
          ENDSSH

  verify_dev:
    name: Verify - DEV
    runs-on: ubuntu-latest
    needs: deploy_dev
    steps:
      - name: Health check DEV frontend
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.DEPLOY_DEV_URL }}) || STATUS="000"
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "DEV health check failed (HTTP $STATUS)"
            exit 1
          fi

  # ── PROD ─────────────────────────────────────────────────────────────────────
  deploy_prod:
    name: Deploy - PROD (frontend + backend)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/prod' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    environment: production
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PROD_PORT }} ${{ secrets.DEPLOY_PROD_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -p ${{ secrets.DEPLOY_PROD_BACKEND_PORT }} ${{ secrets.DEPLOY_PROD_BACKEND_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend to PROD (timehuddle-prod:2064)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_PROD_PORT }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_PROD_HOST }} bash << 'ENDSSH'
            echo "=== git sync → prod ==="
            cd /home/pdharamkar/timehuddle || { echo "ERROR: repo dir missing"; exit 1; }
            git fetch origin || { echo "ERROR: git fetch failed"; exit 1; }
            git checkout -f -B prod origin/prod || { echo "ERROR: git checkout failed"; exit 1; }
            git clean -fd
            echo "branch: $(git branch --show-current)"

            echo "=== npm install ==="
            npm install --no-audit --no-fund || { echo "ERROR: npm install failed"; exit 1; }

            echo "=== build ==="
            rm -rf dist
            npm run build || { echo "ERROR: build failed"; exit 1; }

            echo "=== pm2 restart ==="
            sudo pm2 restart timehuddle-frontend || { echo "ERROR: pm2 restart failed"; exit 1; }
            sudo pm2 save

            echo "=== verify ==="
            ok=false
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/ 2>/dev/null) || STATUS="000"
              if [ "$STATUS" = "200" ]; then
                echo "PROD frontend OK (HTTP 200)"
                ok=true
                break
              fi
              echo "Attempt $i: HTTP $STATUS — retrying in 5s"
              sleep 5
            done
            if [ "$ok" != "true" ]; then
              echo "ERROR: PROD frontend not ready after retries"
              exit 1
            fi
          ENDSSH

      - name: Deploy backend to PROD (timecore-prod:2065)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_PROD_BACKEND_PORT }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_PROD_BACKEND_HOST }} bash << 'ENDSSH'
            echo "=== git sync → prod ==="
            cd /home/pdharamkar/timehuddle || { echo "ERROR: repo dir missing"; exit 1; }
            git fetch origin || { echo "ERROR: git fetch failed"; exit 1; }
            git checkout -f -B prod origin/prod || { echo "ERROR: git checkout failed"; exit 1; }
            git clean -fd
            echo "branch: $(git branch --show-current)"

            echo "=== backend npm install ==="
            cd backend || { echo "ERROR: backend dir missing"; exit 1; }
            npm install --no-audit --no-fund || { echo "ERROR: npm install failed"; exit 1; }

            echo "=== pm2 restart ==="
            sudo pm2 restart timehuddle-api || { echo "ERROR: pm2 restart failed"; exit 1; }
            sudo pm2 save
            echo "PROD backend OK"
          ENDSSH

  verify_prod:
    name: Verify - PROD
    runs-on: ubuntu-latest
    needs: deploy_prod
    steps:
      - name: Health check PROD frontend
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.DEPLOY_PROD_URL }}) || STATUS="000"
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "PROD health check failed (HTTP $STATUS)"
            exit 1
          fi
