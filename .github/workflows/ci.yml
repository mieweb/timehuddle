name: CI / Deploy

# Push to `dev`    → deploys frontend (timehuddledev:2062)  + backend (timecoredev:2063)
# Push to `prod`   → deploys frontend (timehuddle-prod:2064) + backend (timecore-prod:2065)
# Push to `master` → deploys frontend (huddle:2090) only     (shares prod backend)
# Manual dispatch  → choose dev / prod / master via workflow_dispatch button

on:
  push:
    branches: [dev, prod, master]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options: [dev, prod, master]

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── PRE-DEPLOY CHECKS ────────────────────────────────────────────────────────
  checks_frontend:
    name: Checks - Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  checks_backend:
    name: Checks - Backend
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval \"db.adminCommand('ping')\""
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Lint
        working-directory: backend
        run: npm run lint
      - name: Typecheck
        working-directory: backend
        run: npm run typecheck
      - name: Test
        working-directory: backend
        env:
          MONGODB_URI: mongodb://localhost:27017/timehuddle_test
          BETTER_AUTH_SECRET: ci-test-secret
          PORT: 4000
        run: npm test

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: [checks_frontend, checks_backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build

  # ── DEV ──────────────────────────────────────────────────────────────────────
  deploy_dev:
    name: Deploy - DEV (frontend + backend)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/dev' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'dev')
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_DEV_PORT }} ${{ secrets.DEPLOY_DEV_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -p ${{ secrets.DEPLOY_DEV_BACKEND_PORT }} ${{ secrets.DEPLOY_DEV_BACKEND_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend to DEV (timehuddledev:2062)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_DEV_PORT }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_DEV_HOST }} bash << 'ENDSSH'
            set -e
            cd ~/timehuddle || { echo "ERROR: repo dir missing"; exit 1; }

            echo "=== git stash ==="
            STASH_OUT=$(git stash 2>&1)
            echo "$STASH_OUT"

            echo "=== git fetch + pull → dev ==="
            git fetch origin
            git checkout dev
            git pull origin dev

            echo "=== git stash pop ==="
            echo "$STASH_OUT" | grep -q "No local changes to save" || git stash pop
            echo "branch: $(git branch --show-current)"

            echo "=== sudo npm install ==="
            sudo npm install --no-audit --no-fund

            echo "=== sudo npm run build ==="
            sudo rm -rf dist
            sudo npm run build

            echo "=== sudo pm2 list ==="
            sudo pm2 list

            echo "=== sudo pm2 restart ==="
            sudo pm2 restart timehuddle-frontend
            sudo pm2 save

            echo "=== verify ==="
            ok=false
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/ 2>/dev/null) || STATUS="000"
              if [ "$STATUS" = "200" ]; then
                echo "DEV frontend OK (HTTP 200)"
                ok=true
                break
              fi
              echo "Attempt $i: HTTP $STATUS — retrying in 5s"
              sleep 5
            done
            if [ "$ok" != "true" ]; then
              echo "ERROR: DEV frontend not ready after retries"
              exit 1
            fi
          ENDSSH

      - name: Deploy backend to DEV (timecoredev:2063)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_DEV_BACKEND_PORT }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_DEV_BACKEND_HOST }} bash << 'ENDSSH'
            set -e
            cd ~/timehuddle || { echo "ERROR: repo dir missing"; exit 1; }

            echo "=== git stash ==="
            STASH_OUT=$(git stash 2>&1)
            echo "$STASH_OUT"

            echo "=== git fetch + pull → dev ==="
            git fetch origin
            git checkout dev
            git pull origin dev

            echo "=== git stash pop ==="
            echo "$STASH_OUT" | grep -q "No local changes to save" || git stash pop
            echo "branch: $(git branch --show-current)"

            echo "=== sudo npm install (root) ==="
            sudo npm install --no-audit --no-fund

            echo "=== sudo npm install (backend) ==="
            cd backend
            sudo npm install --no-audit --no-fund

            echo "=== migrate ==="
            MONGODB_URI=$(sudo pm2 env 0 2>/dev/null | awk '/^MONGODB_URI:/{print $2}')
            if [ -z "$MONGODB_URI" ]; then
              echo "ERROR: MONGODB_URI not found in pm2 env — migrations skipped safely"
              MONGODB_URI=$(sudo pm2 env 0 2>/dev/null | grep MONGODB_URI | head -1 | sed 's/.*: //')
            fi
            MONGODB_URI="$MONGODB_URI" npm run migrate

            echo "=== sudo pm2 list ==="
            sudo pm2 list

            echo "=== sudo pm2 restart ==="
            sudo pm2 restart timehuddle-api
            sudo pm2 save

            echo "=== backend smoke test ==="
            sleep 3
            HEALTH=$(curl -s http://localhost:4000/health 2>/dev/null)
            echo "Health response: $HEALTH"
            echo "$HEALTH" | grep -q '"status":"ok"' || { echo "ERROR: backend smoke test failed"; exit 1; }
            echo "DEV backend smoke test passed"
          ENDSSH

  verify_dev:
    name: Verify - DEV
    runs-on: ubuntu-latest
    needs: deploy_dev
    steps:
      - name: Frontend smoke test - DEV
        run: |
          sleep 5
          BODY=$(curl -s ${{ secrets.DEPLOY_DEV_URL }}) || BODY=""
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.DEPLOY_DEV_URL }}) || STATUS="000"
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: DEV frontend returned HTTP $STATUS"
            exit 1
          fi
          echo "$BODY" | grep -q "TimeHuddle" || { echo "ERROR: 'TimeHuddle' not found in DEV frontend response — app may not be serving correctly"; exit 1; }
          echo "DEV frontend smoke test passed"

  # ── PROD ─────────────────────────────────────────────────────────────────────
  deploy_prod:
    name: Deploy - PROD (frontend + backend)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/prod' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod')
    environment: production
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_PROD_PORT }} ${{ secrets.DEPLOY_PROD_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -p ${{ secrets.DEPLOY_PROD_BACKEND_PORT }} ${{ secrets.DEPLOY_PROD_BACKEND_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend to PROD (timehuddle-prod:2064)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_PROD_PORT }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_PROD_HOST }} bash << 'ENDSSH'
            set -e
            cd ~/timehuddle || { echo "ERROR: repo dir missing"; exit 1; }

            echo "=== git stash ==="
            STASH_OUT=$(git stash 2>&1)
            echo "$STASH_OUT"

            echo "=== git fetch + pull → prod ==="
            git fetch origin
            git checkout prod
            git pull origin prod

            echo "=== git stash pop ==="
            echo "$STASH_OUT" | grep -q "No local changes to save" || git stash pop
            echo "branch: $(git branch --show-current)"

            echo "=== sudo npm install ==="
            sudo npm install --no-audit --no-fund

            echo "=== sudo npm run build ==="
            sudo rm -rf dist
            sudo npm run build

            echo "=== sudo pm2 list ==="
            sudo pm2 list

            echo "=== sudo pm2 restart ==="
            sudo pm2 restart timehuddle-frontend
            sudo pm2 save

            echo "=== verify ==="
            ok=false
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/ 2>/dev/null) || STATUS="000"
              if [ "$STATUS" = "200" ]; then
                echo "PROD frontend OK (HTTP 200)"
                ok=true
                break
              fi
              echo "Attempt $i: HTTP $STATUS — retrying in 5s"
              sleep 5
            done
            if [ "$ok" != "true" ]; then
              echo "ERROR: PROD frontend not ready after retries"
              exit 1
            fi
          ENDSSH

      - name: Deploy backend to PROD (timecore-prod:2065)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_PROD_BACKEND_PORT }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_PROD_BACKEND_HOST }} bash << 'ENDSSH'
            set -e
            cd ~/timehuddle || { echo "ERROR: repo dir missing"; exit 1; }

            echo "=== git stash ==="
            STASH_OUT=$(git stash 2>&1)
            echo "$STASH_OUT"

            echo "=== git fetch + pull → prod ==="
            git fetch origin
            git checkout prod
            git pull origin prod

            echo "=== git stash pop ==="
            echo "$STASH_OUT" | grep -q "No local changes to save" || git stash pop
            echo "branch: $(git branch --show-current)"

            echo "=== sudo npm install (root) ==="
            sudo npm install --no-audit --no-fund

            echo "=== sudo npm install (backend) ==="
            cd backend
            sudo npm install --no-audit --no-fund

            echo "=== migrate ==="
            MONGODB_URI=$(sudo pm2 env 0 2>/dev/null | awk '/^MONGODB_URI:/{print $2}')
            if [ -z "$MONGODB_URI" ]; then
              MONGODB_URI=$(sudo pm2 env 0 2>/dev/null | grep MONGODB_URI | head -1 | sed 's/.*: //')
            fi
            MONGODB_URI="$MONGODB_URI" npm run migrate

            echo "=== sudo pm2 list ==="
            sudo pm2 list

            echo "=== sudo pm2 restart ==="
            sudo pm2 restart timehuddle-api
            sudo pm2 save

            echo "=== backend smoke test ==="
            sleep 3
            HEALTH=$(curl -s http://localhost:4000/health 2>/dev/null)
            echo "Health response: $HEALTH"
            echo "$HEALTH" | grep -q '"status":"ok"' || { echo "ERROR: backend smoke test failed"; exit 1; }
            echo "PROD backend smoke test passed"
          ENDSSH

  verify_prod:
    name: Verify - PROD
    runs-on: ubuntu-latest
    needs: deploy_prod
    steps:
      - name: Frontend smoke test - PROD
        run: |
          sleep 5
          BODY=$(curl -s ${{ secrets.DEPLOY_PROD_URL }}) || BODY=""
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.DEPLOY_PROD_URL }}) || STATUS="000"
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: PROD frontend returned HTTP $STATUS"
            exit 1
          fi
          echo "$BODY" | grep -q "TimeHuddle" || { echo "ERROR: 'TimeHuddle' not found in PROD frontend response — app may not be serving correctly"; exit 1; }
          echo "PROD frontend smoke test passed"

  # ── MASTER ───────────────────────────────────────────────────────────────────
  # Master frontend (huddle:2090) shares the prod backend — no backend redeploy here.
  deploy_master:
    name: Deploy - MASTER (frontend only)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'master')
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.DEPLOY_MASTER_PORT }} ${{ secrets.DEPLOY_MASTER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy frontend to MASTER (huddle:2090)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.DEPLOY_MASTER_PORT }} \
              -o StrictHostKeyChecking=yes \
              -o ConnectTimeout=15 \
              ${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_MASTER_HOST }} bash << 'ENDSSH'
            set -e
            cd ~/timehuddle || { echo "ERROR: repo dir missing"; exit 1; }

            echo "=== git stash ==="
            STASH_OUT=$(git stash 2>&1)
            echo "$STASH_OUT"

            echo "=== git fetch + pull → master ==="
            git fetch origin
            git checkout master
            git pull origin master

            echo "=== git stash pop ==="
            echo "$STASH_OUT" | grep -q "No local changes to save" || git stash pop
            echo "branch: $(git branch --show-current)"

            echo "=== sudo npm install ==="
            sudo npm install --no-audit --no-fund

            echo "=== sudo npm run build ==="
            sudo rm -rf dist
            sudo npm run build

            echo "=== sudo pm2 list ==="
            sudo pm2 list

            echo "=== sudo pm2 restart ==="
            sudo pm2 restart timehuddle-frontend
            sudo pm2 save

            echo "=== verify ==="
            ok=false
            for i in 1 2 3 4 5; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:80/ 2>/dev/null) || STATUS="000"
              if [ "$STATUS" = "200" ]; then
                echo "MASTER frontend OK (HTTP 200)"
                ok=true
                break
              fi
              echo "Attempt $i: HTTP $STATUS — retrying in 5s"
              sleep 5
            done
            if [ "$ok" != "true" ]; then
              echo "ERROR: MASTER frontend not ready after retries"
              exit 1
            fi
          ENDSSH

  verify_master:
    name: Verify - MASTER
    runs-on: ubuntu-latest
    needs: deploy_master
    steps:
      - name: Frontend smoke test - MASTER
        run: |
          sleep 5
          BODY=$(curl -s ${{ secrets.DEPLOY_MASTER_URL }}) || BODY=""
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.DEPLOY_MASTER_URL }}) || STATUS="000"
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: MASTER frontend returned HTTP $STATUS"
            exit 1
          fi
          echo "$BODY" | grep -q "TimeHuddle" || { echo "ERROR: 'TimeHuddle' not found in MASTER frontend response — app may not be serving correctly"; exit 1; }
          echo "MASTER frontend smoke test passed"
