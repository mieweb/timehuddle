name: CI / Frontend

on:
  push:
    branches:
      - main

concurrency:
  group: ci-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint_and_types:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    needs: lint_and_types
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm install --no-audit --no-fund
      - run: npm run build

  check_ssh_dev:
    name: SSH Check - DEV
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2062 timehuddledev.os.mieweb.org >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connectivity to DEV (port 2062)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p 2062 \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              pdharamkar@timehuddledev.os.mieweb.org \
              "echo 'SSH OK: DEV' && hostname && whoami && pwd"

  check_ssh_prod:
    name: SSH Check - PROD
    runs-on: ubuntu-latest
    needs: check_ssh_dev
    environment: production
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 2064 timehuddle-prod.os.mieweb.org >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SSH connectivity to PROD (port 2064)
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p 2064 \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              pdharamkar@timehuddle-prod.os.mieweb.org \
              "echo 'SSH OK: PROD' && hostname && whoami && pwd"
