name: PR Preview Environment

# Build Docker image and deploy preview container using Proxmox Launchpad.
# On PR close, the container is automatically deleted.
#
# Base image: ghcr.io/mieweb/opensource-server/nodejs (systemd PID 1, Node 24, SSH)
# Services:   port 3000 (frontend), port 3100 (Meteor API), port 22 (SSH)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  REGISTRY: ghcr.io

jobs:
  # ── Post an immediate "building" comment so devs know the pipeline started ──
  notify-building:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const body = `${marker}
            ## ⏳ Preview Build In Progress

            Docker image is building — Meteor bundle compilation takes a few minutes.

            A new comment will appear here when the preview is ready.
            `;
            const { owner, repo } = context.repo;
            const issue_number = parseInt(process.env.PR_NUMBER);
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  # ── Build and push Docker image to GHCR ──────────────────────────────────
  build-and-push:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
      container_name: ${{ steps.container.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - id: container
        name: Compute container name
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          CONTAINER_NAME="${{ github.repository_owner }}-${REPO_NAME}-${{ github.head_ref }}"
          CONTAINER_NAME=${CONTAINER_NAME,,}
          CONTAINER_NAME=$(echo "$CONTAINER_NAME" | sed 's/[^a-z0-9-]/-/g')
          echo "name=${CONTAINER_NAME}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: |
          echo "tag=${{ env.REGISTRY }}/${{ github.repository_owner }}/timehuddle:pr-${{ github.event.pull_request.number }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tag }}
          build-args: |
            VITE_TIMECORE_URL=https://${{ steps.container.outputs.name }}-api.os.mieweb.org
          cache-from: type=registry,ref=${{ steps.image.outputs.tag }}-cache
          cache-to: type=registry,ref=${{ steps.image.outputs.tag }}-cache,mode=max

      # Launchpad pulls images anonymously — package must be public.
      - name: Make GHCR image public
        env:
          GHCR_ADMIN_TOKEN: ${{ secrets.GHCR_ADMIN_TOKEN }}
        run: |
          if [ -z "$GHCR_ADMIN_TOKEN" ]; then
            echo "::warning::GHCR_ADMIN_TOKEN not set — ensure ghcr.io/mieweb/timehuddle is public."
            exit 0
          fi
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X PATCH "https://api.github.com/orgs/mieweb/packages/container/timehuddle" \
            -H "Authorization: Bearer $GHCR_ADMIN_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            -d '{"visibility":"public"}')
          CODE=$(echo "$RESPONSE" | tail -1)
          if [ "$CODE" = "200" ]; then
            echo "✅ Package visibility set to public"
          else
            echo "::warning::Could not set package visibility: HTTP $CODE"
          fi

  # ── Deploy via Launchpad ─────────────────────────────────────────────────
  deploy-preview:
    if: github.event.action != 'closed'
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - id: preview
        name: Compute preview URLs
        run: |
          CONTAINER_NAME="${{ needs.build-and-push.outputs.container_name }}"
          echo "container_name=${CONTAINER_NAME}" >> "$GITHUB_OUTPUT"
          echo "url=https://${CONTAINER_NAME}.os.mieweb.org" >> "$GITHUB_OUTPUT"
          echo "api_url=https://${CONTAINER_NAME}-api.os.mieweb.org" >> "$GITHUB_OUTPUT"

      # Deploy using MIEWeb nodejs base image (systemd + SSH).
      # Services: HTTP 3000 (frontend), HTTP 3100 (Meteor API), TCP 22 (SSH).
      # Env vars land in /etc/environment and are picked up by systemd units.
      - name: Deploy via Launchpad
        uses: mieweb/launchpad@main
        with:
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
          template_name: ${{ needs.build-and-push.outputs.image_tag }}
          container_env_vars: >-
            {"MONGO_URL":"mongodb://localhost:27017/timehuddle?replicaSet=rs0","MONGO_OPLOG_URL":"mongodb://localhost:27017/local?replicaSet=rs0","METEOR_AGENDA_ENABLED":"true","CORS_ORIGINS":"${{ steps.preview.outputs.url }}","APP_URL":"${{ steps.preview.outputs.url }}","ROOT_URL":"${{ steps.preview.outputs.api_url }}"}
          services: >-
            [{"type":"http","internalPort":3000,"externalHostname":"${{ steps.preview.outputs.container_name }}","externalDomainId":1},{"type":"http","internalPort":3100,"externalHostname":"${{ steps.preview.outputs.container_name }}-api","externalDomainId":1},{"type":"tcp","internalPort":22,"externalHostname":"${{ steps.preview.outputs.container_name }}","externalDomainId":1}]

      - name: Comment preview URL on PR
        if: success()
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          API_URL: ${{ steps.preview.outputs.api_url }}
          CONTAINER_NAME: ${{ steps.preview.outputs.container_name }}
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const body = `${marker}
            ## 🚀 Preview Deployment Ready

            | Service | URL |
            |---------|-----|
            | **App** | [${ process.env.PREVIEW_URL }](${ process.env.PREVIEW_URL }) |
            | **API** (Meteor) | ${ process.env.API_URL } |
            | **SSH** | \`ssh ${ process.env.CONTAINER_NAME }.os.mieweb.org\` |

            _Preview auto-deletes when this PR is closed._
            `;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Comment failure on PR
        if: failure()
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const body = `${marker}
            ## ❌ Preview Build Failed

            [View logs](${ process.env.RUN_URL }) for details.
            `;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  # ── Cleanup on PR close ───────────────────────────────────────────────────
  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      # Omitting template_name tells Launchpad to delete the container
      - uses: mieweb/launchpad@main
        with:
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}

      - name: Comment cleanup on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const body = `${marker}
            ## 🗑️ Preview Environment Cleaned Up

            The preview container for this PR has been deleted.
            `;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.user?.type === 'Bot' && typeof c.body === 'string' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
