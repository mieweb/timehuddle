name: PR Preview Environment

# Build Docker image and deploy preview container using Proxmox Launchpad
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Delete failed container (if any)
        env:
          API_KEY: ${{ secrets.LAUNCHPAD_API_KEY }}
          API_URL: ${{ secrets.LAUNCHPAD_API_URL }}
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          CONTAINER_NAME="${{ github.repository_owner }}-${REPO_NAME}-${{ github.head_ref }}"
          CONTAINER_NAME=${CONTAINER_NAME,,}
          CONTAINER_NAME=$(echo "$CONTAINER_NAME" | sed 's/[^a-z0-9-]/-/g')

          RESPONSE=$(curl -s -H "Authorization: Bearer $API_KEY" -H "Accept: application/json" \
            "$API_URL/sites/1/containers?hostname=$CONTAINER_NAME")

          if ! echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
            echo "Launchpad API returned non-JSON response; skipping cleanup."
            CONTAINER_ID=""
            CONTAINER_STATUS=""
          else
            CONTAINER_ID=$(echo "$RESPONSE" | jq -r '.containers[0].id // empty')
            CONTAINER_STATUS=$(echo "$RESPONSE" | jq -r '.containers[0].status // empty')
          fi

          if [[ -n "$CONTAINER_ID" && "$CONTAINER_STATUS" == "failed" ]]; then
            echo "Deleting failed container $CONTAINER_NAME (ID: $CONTAINER_ID)..."
            DELETE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X DELETE -H "Authorization: Bearer $API_KEY" \
              "$API_URL/sites/1/containers/$CONTAINER_ID")
            echo "DELETE response: $DELETE_CODE"
          else
            echo "No failed container to clean up (status: ${CONTAINER_STATUS:-none})."
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: |
          echo "tag=${{ env.REGISTRY }}/${{ github.repository_owner }}/timehuddle:pr-${{ github.event.pull_request.number }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tag }}
          cache-from: type=registry,ref=${{ steps.image.outputs.tag }}-cache
          cache-to: type=registry,ref=${{ steps.image.outputs.tag }}-cache,mode=max

  deploy-preview:
    if: github.event.action != 'closed'
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - id: preview
        name: Compute preview URL
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          CONTAINER_NAME="${{ github.repository_owner }}-${REPO_NAME}-${{ github.head_ref }}"
          CONTAINER_NAME=${CONTAINER_NAME,,}
          CONTAINER_NAME=$(echo "$CONTAINER_NAME" | sed 's/[^a-z0-9-]/-/g')
          echo "container_name=${CONTAINER_NAME}" >> "$GITHUB_OUTPUT"
          echo "url=https://${CONTAINER_NAME}.os.mieweb.org" >> "$GITHUB_OUTPUT"

      - uses: mieweb/launchpad@main
        with:
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
          template_name: ${{ needs.build-and-push.outputs.image_tag }}
          container_env_vars: |
            {
              "MONGODB_URI": "mongodb://localhost:27017/timehuddle",
              "NODE_ENV": "production",
              "APP_URL": "http://localhost:3000",
              "ROOT_URL": "http://localhost:3000",
              "PORT": "4000",
              "VITE_API_URL": "http://localhost:4000"
            }
          services: |
            [
              {
                "type": "http",
                "internalPort": 3000,
                "externalHostname": "${{ steps.preview.outputs.container_name }}",
                "externalDomainId": 1
              }
            ]

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const body = `${marker}
            ## 🚀 Preview Deployment Ready

            Your preview environment is live at:
            **${ process.env.PREVIEW_URL }**

            _This preview will be automatically deleted when the PR is closed._
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: mieweb/launchpad@main
        with:
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
          # Omitting template_name triggers container deletion

      - name: Comment cleanup on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const body = `${marker}
            ## 🗑️ Preview Environment Cleaned Up

            The preview container for this PR has been deleted.
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            }
