name: PR Preview Environment

# Build Docker image and deploy preview container using Proxmox Launchpad
on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image.outputs.tag }}
      container_name: ${{ steps.container.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - id: container
        name: Compute container name
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          CONTAINER_NAME="${{ github.repository_owner }}-${REPO_NAME}-${{ github.head_ref }}"
          CONTAINER_NAME=${CONTAINER_NAME,,}
          CONTAINER_NAME=$(echo "$CONTAINER_NAME" | sed 's/[^a-z0-9-]/-/g')
          echo "name=${CONTAINER_NAME}" >> "$GITHUB_OUTPUT"

      - name: Delete failed container (if any)
        env:
          API_KEY: ${{ secrets.LAUNCHPAD_API_KEY }}
          API_URL: ${{ secrets.LAUNCHPAD_API_URL }}
          CONTAINER_NAME: ${{ steps.container.outputs.name }}
        run: |
          RESPONSE=$(curl -s -H "Authorization: Bearer $API_KEY" -H "Accept: application/json" \
            "$API_URL/sites/1/containers?hostname=$CONTAINER_NAME")

          if ! echo "$RESPONSE" | jq -e . >/dev/null 2>&1; then
            echo "Launchpad API returned non-JSON response; skipping cleanup."
            CONTAINER_ID=""
            CONTAINER_STATUS=""
          else
            CONTAINER_ID=$(echo "$RESPONSE" | jq -r '.containers[0].id // empty')
            CONTAINER_STATUS=$(echo "$RESPONSE" | jq -r '.containers[0].status // empty')
          fi

          if [[ -n "$CONTAINER_ID" && "$CONTAINER_STATUS" == "failed" ]]; then
            echo "Deleting failed container $CONTAINER_NAME (ID: $CONTAINER_ID)..."
            DELETE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X DELETE -H "Authorization: Bearer $API_KEY" \
              "$API_URL/sites/1/containers/$CONTAINER_ID")
            echo "DELETE response: $DELETE_CODE"
          else
            echo "No failed container to clean up (status: ${CONTAINER_STATUS:-none})."
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: image
        run: |
          echo "tag=${{ env.REGISTRY }}/${{ github.repository_owner }}/timehuddle:pr-${{ github.event.pull_request.number }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_OUTPUT

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.image.outputs.tag }}
          build-args: |
            VITE_TIMECORE_URL=https://${{ steps.container.outputs.name }}-api.os.mieweb.org
          cache-from: type=registry,ref=${{ steps.image.outputs.tag }}-cache
          cache-to: type=registry,ref=${{ steps.image.outputs.tag }}-cache,mode=max

  deploy-preview:
    if: github.event.action != 'closed'
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - id: preview
        name: Compute preview URL
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")
          CONTAINER_NAME="${{ github.repository_owner }}-${REPO_NAME}-${{ github.head_ref }}"
          CONTAINER_NAME=${CONTAINER_NAME,,}
          CONTAINER_NAME=$(echo "$CONTAINER_NAME" | sed 's/[^a-z0-9-]/-/g')
          echo "container_name=${CONTAINER_NAME}" >> "$GITHUB_OUTPUT"
          echo "url=https://${CONTAINER_NAME}.os.mieweb.org" >> "$GITHUB_OUTPUT"
          echo "api_url=https://${CONTAINER_NAME}-api.os.mieweb.org" >> "$GITHUB_OUTPUT"

      # This app bundles MongoDB + Meteor + the frontend into a single,
      # heavy image (~50GB rootfs once unpacked), so Proxmox's vzcreate
      # step routinely runs past mieweb/launchpad@main's built-in 300s
      # wait — that composite action doesn't expose max_attempts/
      # poll_interval, so we call the same lower-level actions it wraps
      # directly, with a longer wait budget.
      - name: Locate existing container
        id: locate
        uses: mieweb/opensource-server/.github/actions/get-container@main
        with:
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          hostname: ${{ steps.preview.outputs.container_name }}

      - name: Delete existing container (recreate with new image)
        if: steps.locate.outputs.found == 'true'
        uses: mieweb/opensource-server/.github/actions/delete-container@main
        with:
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          container_id: ${{ steps.locate.outputs.container_id }}

      - name: Prepare services configuration
        id: services
        run: |
          FRONTEND_HOSTNAME="${{ steps.preview.outputs.container_name }}"
          API_HOSTNAME="${{ steps.preview.outputs.container_name }}-api"
          
          cat > /tmp/services.json <<EOF
          [
            {
              "type": "http",
              "internalPort": 3000,
              "externalHostname": "${FRONTEND_HOSTNAME}",
              "externalDomainId": 1
            },
            {
              "type": "http",
              "internalPort": 3100,
              "externalHostname": "${API_HOSTNAME}",
              "externalDomainId": 1
            }
          ]
          EOF
          
          SERVICES_JSON=$(cat /tmp/services.json | jq -c .)
          echo "services=${SERVICES_JSON}" >> "$GITHUB_OUTPUT"
          echo "--- Services Configuration ---"
          echo "${SERVICES_JSON}" | jq .

      - name: Create container
        id: create
        uses: mieweb/opensource-server/.github/actions/create-container@main
        with:
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          hostname: ${{ steps.preview.outputs.container_name }}
          template_name: ${{ needs.build-and-push.outputs.image_tag }}
          container_env_vars: |
            {
              "MONGO_URL": "mongodb://localhost:27017/timehuddle?directConnection=true",
              "MONGO_OPLOG_URL": "mongodb://localhost:27017/local?directConnection=true",
              "METEOR_PACKAGE_DIRS": "../vendor/meteor-wormhole/packages",
              "METEOR_ALLOW_SUPERUSER": "true",
              "METEOR_AGENDA_ENABLED": "true",
              "CORS_ORIGINS": "${{ steps.preview.outputs.url }}",
              "APP_URL": "${{ steps.preview.outputs.url }}",
              "ROOT_URL": "${{ steps.preview.outputs.api_url }}"
            }
          services: ${{ steps.services.outputs.services }}

      - name: Wait for creation job to complete
        if: steps.create.outputs.created == 'true'
        uses: mieweb/opensource-server/.github/actions/wait-for-job@main
        with:
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          job_id: ${{ steps.create.outputs.job_id }}
          max_attempts: "90"
          poll_interval: "10"

      - name: Confirm container is running
        id: status
        uses: mieweb/opensource-server/.github/actions/get-container@main
        with:
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          hostname: ${{ steps.preview.outputs.container_name }}

      - name: Report container status
        env:
          CONTAINER_STATUS: ${{ steps.status.outputs.status }}
        run: |
          echo "Container status: ${CONTAINER_STATUS:-unknown}"
          if [ "$CONTAINER_STATUS" != "running" ]; then
            echo "::error::Container status is '${CONTAINER_STATUS:-unknown}', expected 'running'."
            exit 1
          fi

      # TEMPORARY: dumps the raw container record and job log on failure
      # so we can confirm whether the extended wait above was sufficient.
      # Remove once the deploy is reliably green.
      - name: Debug — dump raw container record and job log
        if: failure()
        continue-on-error: true
        env:
          API_KEY: ${{ secrets.LAUNCHPAD_API_KEY }}
          API_URL: ${{ secrets.LAUNCHPAD_API_URL }}
          CONTAINER_NAME: ${{ steps.preview.outputs.container_name }}
        run: |
          echo "--- container record (by hostname) ---"
          BODY=$(curl -s -H "Authorization: Bearer $API_KEY" -H "Accept: application/json" \
            "$API_URL/api/v1/sites/1/containers?hostname=$CONTAINER_NAME")
          echo "$BODY" | jq .

          JOB_ID=$(echo "$BODY" | jq -r '.data[0].creationJobId // empty')
          if [ -n "$JOB_ID" ]; then
            echo "--- job $JOB_ID metadata ---"
            curl -s -H "Authorization: Bearer $API_KEY" -H "Accept: application/json" \
              "$API_URL/api/v1/jobs/$JOB_ID" | jq .
            echo "--- job $JOB_ID status log rows ---"
            curl -s -H "Authorization: Bearer $API_KEY" -H "Accept: application/json" \
              "$API_URL/api/v1/jobs/$JOB_ID/status?limit=1000" | jq .
          else
            echo "No creationJobId found on container record — skipping job log fetch."
          fi

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.url }}
          API_URL: ${{ steps.preview.outputs.api_url }}
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const body = `${marker}
            ## 🚀 Preview Deployment Ready

            Your preview environment is live at:
            - **Frontend:** ${ process.env.PREVIEW_URL }
            - **API:** ${ process.env.API_URL }

            _This preview will be automatically deleted when the PR is closed._
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

  cleanup-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: mieweb/launchpad@main
        with:
          api_key: ${{ secrets.LAUNCHPAD_API_KEY }}
          api_url: ${{ secrets.LAUNCHPAD_API_URL }}
          # Omitting template_name triggers container deletion

      - name: Comment cleanup on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- preview-url-comment -->';
            const body = `${marker}
            ## 🗑️ Preview Environment Cleaned Up

            The preview container for this PR has been deleted.
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === 'Bot' &&
                typeof comment.body === 'string' &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            }
