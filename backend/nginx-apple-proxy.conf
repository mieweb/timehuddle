# Nginx configuration snippet for Apple Sign In with frontend domain
# This should be added to the nginx/load balancer configuration that handles
# timehuddledev.os.mieweb.org (the frontend domain)

# Route Apple domain association to the backend API
location = /.well-known/apple-developer-domain-association.txt {
    proxy_pass http://localhost:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
}

# Route Apple auth callback to the backend API
# This ensures the OAuth flow completes on the backend
location /api/auth/callback/apple {
    proxy_pass http://localhost:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    
    # Pass along cookies for the OAuth redirect
    proxy_set_header Cookie $http_cookie;
}

# If you want to route all /api/auth/* paths to the backend:
location /api/auth/ {
    proxy_pass http://localhost:4000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header Cookie $http_cookie;
}
